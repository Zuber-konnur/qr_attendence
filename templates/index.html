<!DOCTYPE html>
<html>
<head>
    <title>Attendance Display</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: #f1f5f9;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

.qr-container {
    background: #ffffff;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.qr-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
}

#timer {
    font-family: monospace;
    color: #cbd5e1;
    margin-top: 20px;
    font-size: 1.1rem;
    letter-spacing: 1px;
}

.top-nav {
    position: absolute;
    top: 25px;
    width: 90%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.glow-text {
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    font-weight: 600;
}

    </style>
</head>
<body>
    <div class="top-nav">
        <h2 class="fw-bold m-0 glow-text">Smart Attendance</h2>
        <a href="admin/dashboard" class="btn btn-outline-light btn-sm px-4">Admin Dashboard</a>
    </div>

    <div class="text-center">
        <h1 class="display-5 fw-bold mb-4">Scan to Check-in</h1>
        <div class="qr-container d-inline-block">
            <div id="qrcode"></div>
        </div>
        <h2 id="timer">Expires in: --s</h2>
        <p class="text-secondary mt-4"><i class="fas fa-info-circle me-2"></i>Ensure your GPS is enabled before scanning</p>
    </div>

    <script>
        const qrcode = new QRCode(document.getElementById("qrcode"), { 
            width: 320, 
            height: 320,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function update() {
            fetch("/get_token").then(r => r.json()).then(data => {
                const url = window.location.origin + "/checkin?token=" + data.token;
                qrcode.makeCode(url);
                document.getElementById("timer").innerText = "Refresh in: " + data.expires_in + "s";
            });
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
