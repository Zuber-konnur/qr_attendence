<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 50px 40px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .btn-primary { background: #4361ee; border: none; padding: 12px; border-radius: 12px; font-weight: 600; }
        .form-control { padding: 12px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="h1 mb-2">🔐</div>
            <h3 class="fw-bold">Admin Portal</h3>
            <p class="text-muted">Enter credentials to manage attendance</p>
        </div>

        {% if error %}
            <div class="alert alert-danger border-0 small text-center">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-semibold small">ADMIN PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow-sm">Authorize Access</button>
        </form>
    </div>
</body>
</html>
